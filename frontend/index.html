<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AetherOrchestra | Agentic Dashboard</title>
    <style>
        :root {
            --bg: #050505;
            --surface: rgba(20, 20, 25, 0.7);
            --primary: #6366f1;
            --accent: #22d3ee;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at top right, #1e1b4b, transparent), 
                              radial-gradient(circle at bottom left, #0f172a, transparent);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }

        .glass-container {
            display: flex;
            height: 95vh;
            margin: 2.5vh;
            background: var(--surface);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            overflow: hidden;
        }

        .sidebar {
            width: 260px;
            border-right: 1px solid var(--border);
            padding: 2rem;
            display: flex;
            flex-direction: column;
        }

        .brand {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 3rem;
        }

        .brand span { color: var(--primary); }

        .content {
            flex: 1;
            padding: 2rem 3rem;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 3rem;
        }

        #status-indicator {
            padding: 0.5rem 1.25rem;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .status-idle { border: 1px solid var(--text-dim); color: var(--text-dim); }
        .status-running { border: 1px solid var(--accent); color: var(--accent); box-shadow: 0 0 15px rgba(34, 211, 238, 0.2); }

        .glow-input {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
            background: rgba(0,0,0,0.3);
            padding: 0.5rem;
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 1rem;
            font-size: 1.1rem;
            outline: none;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 2rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 2rem;
            margin-top: 3rem;
            flex: 1;
        }

        .card {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.5rem;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .console-view {
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            color: #cbd5e1;
            overflow-y: auto;
            flex: 1;
        }

        .plan-item {
            padding: 1rem;
            background: rgba(255,255,255,0.02);
            border-radius: 12px;
            margin-bottom: 1rem;
            border-left: 3px solid var(--primary);
        }
    </style>
</head>
<body>
    <div class="glass-container">
        <aside class="sidebar">
            <div class="brand">Aether<span>Core</span></div>
        </aside>

        <main class="content">
            <header class="top-bar">
                <div id="status-indicator" class="status-idle">System Ready</div>
            </header>

            <div class="input-section">
                <h1>What is the objective?</h1>
                <div class="glow-input">
                    <input type="text" id="goal-input" placeholder="Assign a high-level mission...">
                    <button id="launch-btn">Deploy Agents</button>
                    <button id="reset-btn" style="background: #ef4444; padding: 0 1rem; font-size: 0.8rem;">Force Reset</button>
                </div>
            </div>

            <div class="dashboard-grid">
                <div class="card">
                    <h3>Tactical Plan</h3>
                    <div id="plan-container">Waiting for mission...</div>
                </div>
                <div class="card">
                    <h3>Neural Logs</h3>
                    <div id="log-container" class="console-view">> [SYSTEM] Idle</div>
                </div>
            </div>
        </main>
    </div>
    <script>
        const launchBtn = document.getElementById('launch-btn');
        const goalInput = document.getElementById('goal-input');
        const statusInd = document.getElementById('status-indicator');
        const planCont = document.getElementById('plan-container');
        const logCont = document.getElementById('log-container');
        const resetBtn = document.getElementById('reset-btn');

        const API_URL = 'http://localhost:8000/api';

        async function refreshUI() {
            try {
                const res = await fetch(`${API_URL}/status`);
                const data = await res.json();

                statusInd.textContent = data.status === 'RUNNING' ? 'Agent Active' : 'System Ready';
                statusInd.className = data.status === 'RUNNING' ? 'status-running' : 'status-idle';

                if (data.plan.length > 0) {
                    planCont.innerHTML = data.plan.map(step => `
                        <div class="plan-item ${data.active_task === step.desc ? 'active' : ''}">
                            <small>STEP 0${step.id}</small>
                            <p>${step.desc}</p>
                        </div>
                    `).join('');
                }

                logCont.innerHTML = data.logs.map(log => `<div>> ${log}</div>`).join('');
                logCont.scrollTop = logCont.scrollHeight;
            } catch (e) {}
        }

        resetBtn.addEventListener('click', async () => {
            await fetch(`${API_URL}/reset`, { method: 'POST' });
            refreshUI();
        });

        launchBtn.addEventListener('click', async () => {
            const goal = goalInput.value;
            if (!goal) return;
            await fetch(`${API_URL}/start`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ goal })
            });
        });

        setInterval(refreshUI, 1000);
    </script>
</body>
</html>
