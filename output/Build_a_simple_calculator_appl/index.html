{"path": "index.html", 
"content": 
"<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>Calculator Application</title>
<link rel='stylesheet' href='style.css'>
</head>
<body>
<div class='calculator-container'>
<div class='display-box'>
<input type='text' class='display' id='display' disabled>
</div>
<div class='button-container'>
<button class='button large-button operator-button' id='clear'>C</button>
<button class='button large-operator-button' id='divide-assign'>/</button>
<button class='button large-operator-button' id='multiply-assign'>*</button>
<button class='button large-operator-button' id='subtract-assign'>-</button>
<button class='button large-operator-button' id='add-assign'>+</button>
<button class='button small-operator-button' id='divide'>/</button>
<button class='button small-operator-button' id='multiply'>*</button>
<button class='button small-operator-button' id='subtract'>-</button>
<button class='button small-operator-button' id='add'>+</button>
<button class='button large-number-button' id='seven'>7</button>
<button class='button large-number-button' id='eight'>8</button>
<button class='button large-number-button' id='nine'>9</button>
<button class='button small-number-button' id='four'>4</button>
<button class='button small-number-button' id='five'>5</button>
<button class='button small-number-button' id='six'>6</button>
<button class='button small-number-button' id='one'>1</button>
<button class='button small-number-button' id='two'>2</button>
<button class='button small-number-button' id='three'>3</button>
<button class='button large-number-button' id='zero'>0</button>
<button class='button small-number-button' id='decimal'>.</button>
<button class='button equals-button' id='equals('=')>=</button>
</div>
</div>
<script src='script.js'></script>
</body>
</html>"}
