<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Scientific Calculator</h1>
        <div class="input-container">
            <input type="text" id="display" disabled readonly>
            <input type="text" id="expression" hidden>
        </div>
        <div class="button-grid">
            <div class="row">
                <button class="digit" value="7">7</button>
                <button class="digit" value="8">8</button>
                <button class="digit" value="9">9</button>
                <button class="operator" value="/">/</button>
            </div>
            <div class="row">
                <button class="digit" value="4">4</button>
                <button class="digit" value="5">5</button>
                <button class="digit" value="6">6</button>
                <button class="operator" value="*">*</button>
            </div>
            <div class="row">
                <button class="digit" value="1">1</button>
                <button class="digit" value="2">2</button>
                <button class="digit" value="3">3</button>
                <button class="operator" value="-">-</button>
            </div>
            <div class="row">
                <button class="digit" value="0">0</button>
                <button class="dot" value=".">.</button>
                <button class="clear">Clear</button>
                <button class="operator" value="+">+</button>
            </div>
            <div class="row">
                <button class="function" value="sin">sin</button>
                <button class="function" value="cos">cos</button>
                <button class="function" value="tan">tan</button>
                <button class="function" value="sqrt">sqrt</button>
            </div>
            <div class="row">
                <button class="function" value="log">log</button>
                <button class="function" value="exp">exp</button>
                <button class="function" value="pi">pi</button>
                <button class="function" value="=("=")>=</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
