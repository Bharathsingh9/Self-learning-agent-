<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Calculator</title>
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.3/css/all.css">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container mt-5">
        <div class="row">
            <div class="col-md-12">
                <div class="calculator d-flex flex-column">
                    <!-- Numeric Display -->
                    <div class="display-4 text-center my-4">
                        <p id="numeric-display" class="font-weight-bold">0</p>
                    </div>
                    
                    <!-- Algebraic Display -->
                    <div class="algebraic-display text-center my-4">
                        <p id="algebraic-display" class="font-weight-bold"></p>
                    </div>
                    
                    <!-- Input Field -->
                    <div class="input-field d-flex align-items-center justify-content-center mt-5">
                        <input type="text" id="user-input" class="w-100 h-75 px-3 py-2 border-0" disabled>
                    </div>
                    
                    <!-- Button Row 1 -->
                    <div class="d-flex align-items-center justify-content-between mb-4">
                        <button class="btn btn-light btn-lg px-4" id="clear-button" onclick="clearCalculator();">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                        <button class="btn btn-light btn-lg px-4" onclick="resetCalculator();">
                            <i class="fas fa-undo-alt"></i>
                        </button>
                    </div>
                    
                    <!-- Button Row 2 -->
                    <div class="d-flex align-items-center justify-content-between mb-4">
                        <button class="btn btn-light btn-lg px-4" onclick="displayNumber('7')">7</button>
                        <button class="btn btn-light btn-lg px-4" onclick="displayNumber('8')">8</button>
                        <button class="btn btn-light btn-lg px-4" onclick="displayNumber('9')">9</button>
                        <button class="btn btn-light btn-lg px-4" onclick="divide()">/</button>
                    </div>
                    
                    <!-- Button Row 3 -->
                    <div class="d-flex align-items-center justify-content-between mb-4">
                        <button class="btn btn-light btn-lg px-4" onclick="displayNumber('4')">4</button>
                        <button class="btn btn-light btn-lg px-4" onclick="displayNumber('5')">5</button>
                        <button class="btn btn-light btn-lg px-4" onclick="displayNumber('6')">6</button>
                        <button class="btn btn-light btn-lg px-4" onclick="multiply()">×</button>
                    </div>
                    
                    <!-- Button Row 4 -->
                    <div class="d-flex align-items-center justify-content-between mb-4">
                        <button class="btn btn-light btn-lg px-4" onclick="displayNumber('1')">1</button>
                        <button class="btn btn-light btn-lg px-4" onclick="displayNumber('2')">2</button>
                        <button class="btn btn-light btn-lg px-4" onclick="displayNumber('3')">3</button>
                        <button class="btn btn-light btn-lg px-4" onclick="subtract()">-</button>
                    </div>
                    
                    <!-- Button Row 5 -->
                    <div class="d-flex align-items-center justify-content-between mb-4">
                        <button class="btn btn-light btn-lg px-4" onclick="displayNumber('0')">0</button>
                        <button class="btn btn-light btn-lg px-4" onclick="displayDot()">.</button>
                        <button class="btn btn-light btn-lg px-4" onclick="displayEquals()">=</button>
                        <button class="btn btn-light btn-lg px-4" onclick="add()">+</button>
                    </div>
                    
                    <!-- Button Row 6 -->
                    <div class="d-flex align-items-center justify-content-between mb-4">
                        <button class="btn btn-light btn-lg px-4" id="sin-button" onclick="displayFunction('sin')">sin</button>
                        <button class="btn btn-light btn-lg px-4" id="cos-button" onclick="displayFunction('cos')">cos</button>
                        <button class="btn btn-light btn-lg px-4" id="tan-button" onclick="displayFunction('tan')">tan</button>
                        <button class="btn btn-light btn-lg px-4" id="sqrt-button" onclick="displayFunction('sqrt')">√</button>
                    </div>
                    
                    <!-- Button Row 7 -->
                    <div class="d-flex align-items-center justify-content-between mb-4">
                        <button class="btn btn-light btn-lg px-4" id="ln-button" onclick="displayFunction('ln')">ln</button>
                        <button class="btn btn-light btn-lg px-4" id="log-button" onclick="displayFunction('log')">log</button>
                        <button class="btn btn-light btn-lg px-4" id="pow-button" onclick="displayFunction('^')">^</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
