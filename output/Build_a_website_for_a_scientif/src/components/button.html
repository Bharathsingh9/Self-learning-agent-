<!-- src/components/button.html -->

<div class="button-container">
    <div class="button-grid">
        <!-- Number buttons -->
        <button class="button number-button" data-value="7">7</button>
        <button class="button number-button" data-value="8">8</button>
        <button class="button number-button" data-value="9">9</button>
        <button class="button number-button" data-value="4">4</button>
        <button class="button number-button" data-value="5">5</button>
        <button class="button number-button" data-value="6">6</button>
        <button class="button number-button" data-value="1">1</button>
        <button class="button number-button" data-value="2">2</button>
        <button class="button number-button" data-value="3">3</button>
        <button class="button number-button" data-value="0">0</button>
        
        <!-- Operator buttons -->
        <button class="button operator-button" data-value="+">+</button>
        <button class="button operator-button" data-value="-">-</button>
        <button class="button operator-button" data-value="*">*</button>
        <button class="button operator-button" data-value="/">/</button>
        
        <!-- Special buttons -->
        <button class="button special-button" data-value=".">.</button>
        <button class="button special-button" data-value="=">=</button>
        <button class="button special-button" data-value="C">C</button>
        <button class="button special-button" data-value="%">%</button>
        
        <!-- Math function buttons -->
        <button class="button math-function-button" data-value="sin">sin</button>
        <button class="button math-function-button" data-value="cos">cos</button>
        <button class="button math-function-button" data-value="tan">tan</button>
        <button class="button math-function-button" data-value="sqrt">sqrt</button>
        <button class="button math-function-button" data-value="log">log</button>
        <button class="button math-function-button" data-value="exp">exp</button>
        <button class="button math-function-button" data-value="pi">pi</button>
    </div>
</div>

<style>
    .button-container {
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
        border: 1px solid #ccc;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
    }
    
    .button-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        grid-template-rows: repeat(5, 60px);
        gap: 10px;
        padding: 20px;
        border: 1px solid #ccc;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
    }
    
    .button {
        border: none;
        border-radius: 10px;
        padding: 10px;
        font-size: 20px;
        font-weight: bold;
        cursor: pointer;
        color: #333;
    }
    
    .number-button {
        background-color: #f0f0f0;
    }
    
    .operator-button {
        background-color: #ffc107;
    }
    
    .special-button {
        background-color: #ff9800;
    }
    
    .math-function-button {
        background-color: #4c5ca9;
    }
    
    .button:hover {
        background-color: #ddd;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
    }
</style>
