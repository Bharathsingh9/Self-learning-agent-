<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NLP Sentiment Analyzer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <h1>NLP Sentiment Analyzer</h1>
        <nav>
            <ul>
                <li><a href="{{ url_for('index') }}">Home</a></li>
                <li><a href="{{ url_for('analyze') }}">Analyze Text</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="analyze-text">
            <h2>Analyze Text</h2>
            <form action="{{ url_for('analyze') }}" method="post">
                <textarea name="text" placeholder="Enter text to analyze" style="height:100px; width:800px;padding:10px;"></textarea>
                <button type="submit">Analyze</button>
            </form>
            {% if result %}
                <p>Text: {{ text }}</p>
                <p>Sentiment: {{ result }}</p>
            {% endif %}
        </section>
    </main>
    <footer>
        <p>&copy; 2024 NLP Sentiment Analyzer</p>
    </footer>
</body>
</html>
