<!-- templates/results.html -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background-color: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Text Sentiment Analysis Results</h1>
        <p id="results"></p>
        <p id="sentiment"></p>
        <p id="score"></p>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function(event) {
            const resultsElement = document.getElementById('results');
            const sentimentElement = document.getElementById('sentiment');
            const scoreElement = document.getElementById('score');

            const text = localStorage.getItem('text');
            const results = localStorage.getItem('results');
            const sentiment = localStorage.getItem('sentiment');
            const score = localStorage.getItem('score');

            if (text && results && sentiment && score) {
                resultsElement.textContent = `Text: ${text}\nResults: ${results}`;
                sentimentElement.textContent = `Sentiment: ${sentiment}`;
                scoreElement.textContent = `Score: ${score}`;
            }
        });
    </script>
</body>
</html>
