[global]
upgrade = True
timeout = 10

[install]
requires-python = >=3.6
build-system = pip-build-system
setuptools = ~=50.3.0
wheel = ~=0.37.1
setuptools-scm = ~=6.0.1

[project]
name = SentimentAnalyzer

[toolset]
setuptools = {'version': ''}

[wheel]
universal = true

[options]
private-key = ${conda:private-key}

[options.extras_require]
nlp = spacy[nl-core][de-core][es-core][tr-core]
       nltk
flask = Flask
nltk.download = True

[options.package]
includes =
    *

[build-system]
requires = ['setuptools>=50.3.0']
build-backend = 'setuptools.build_meta:MetaBackend'

[tool.setuptools.scm]
revision = 'git describe --tags --always'

[options.packages.find_namespace]
name = nlp

[package_data]
include_package_data = True
package_dir = {'': ''}
